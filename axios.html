<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axios Menü</title>
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
    .vissza-gomb { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
    .vissza-gomb:hover { background: #1a252f; }
    
    h1 { color: #2c3e50; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
    form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 25px; }
    input { padding: 10px; margin-right: 10px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
    button[type="submit"] { padding: 10px 20px; background-color: #d32f2f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button[type="submit"]:hover { background-color: #b71c1c; }
    
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    th { background-color: #333; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 13px; }
    td { padding: 12px 15px; border-bottom: 1px solid #eee; }
    tr:hover { background-color: #f9f9f9; }

    td button { padding: 6px 12px; margin-right: 5px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; }
    td button:first-child { background-color: #f39c12; } /* Módosít */
    td button:last-child { background-color: #e74c3c; }  /* Töröl */
</style>
    </head>
<body>
    <a href="index.html" class="vissza-gomb">← Vissza a Főoldalra</a>
    <div id="root"></div>
    <script type="module" src="./react-mappa/dist/assets/index.js"></script>
</body>
</html>
