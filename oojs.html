<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>OOJS Grafikus Pizza Készítő</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #fafafa; }
        .pizza-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .pizza-card { background: white; border: 1px solid #ccc; padding: 15px; border-radius: 10px; width: 200px; text-align: center; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .pizza-base { width: 150px; height: 150px; background-color: #f4a460; border-radius: 50%; margin: 10px auto; position: relative; border: 5px solid #d28c47; }
        .topping { width: 20px; height: 20px; border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <h1>Mesteri Pizza Készítő (OOJS)</h1>
    <p>A pizzákat Objektumorientált JavaScript generálja a DOM-ba.</p>
    <div id="pizza-konyha" class="pizza-container"></div>

    <script>
        class Etel {
            constructor(nev, alapAr) {
                this.nev = nev;
                this.alapAr = alapAr;
            }

            getAr() {
                return this.alapAr;
            }
        }

        class Pizza extends Etel {
            constructor(nev, alapAr, feltetek) {
                // Szülő osztály konstruktorának hívása (super)
                super(nev, alapAr);
                this.feltetek = feltetek;
            }

            getAr() {
                // A feltétek darabja 250 Ft extra
                return super.getAr() + (this.feltetek.length * 250);
            }

            kirajzol() {
                // HTML elemek létrehozása JavaScriptből
                const kartya = document.createElement('div');
                kartya.className = 'pizza-card';

                const cim = document.createElement('h3');
                cim.innerText = `${this.nev} - ${this.getAr()} Ft`;
                kartya.appendChild(cim);

                const teszta = document.createElement('div');
                teszta.className = 'pizza-base';

                // Feltétek véletlenszerű grafikus elhelyezése
                this.feltetek.forEach(feltet => {
                    // Csinálunk 3 darabot minden feltétből a látvány kedvéért
                    for(let i=0; i<3; i++) {
                        const darab = document.createElement('div');
                        darab.className = 'topping';
                        darab.style.top = Math.floor(Math.random() * 110 + 10) + 'px';
                        darab.style.left = Math.floor(Math.random() * 110 + 10) + 'px';
                        
                        // Színek feltétek szerint
                        if(feltet === 'Szalámi') darab.style.backgroundColor = '#cc3300';
                        if(feltet === 'Gomba') darab.style.backgroundColor = '#999999';
                        if(feltet === 'Kukorica') darab.style.backgroundColor = '#ffcc00';
                        if(feltet === 'Paprika') darab.style.backgroundColor = '#33cc33';

                        teszta.appendChild(darab);
                    }
                });

                kartya.appendChild(teszta);
                
                document.getElementById('pizza-konyha').appendChild(kartya);
            }
        }

        const margherita = new Pizza("Margherita", 1500, []);
        margherita.kirajzol();

        const szalamis = new Pizza("Szalámis", 1500, ["Szalámi"]);
        szalamis.kirajzol();

        const magyaros = new Pizza("Magyaros", 1500, ["Szalámi", "Paprika"]);
        magyaros.kirajzol();

        const hawaiiKukoricas = new Pizza("Vegetáriánus", 1500, ["Gomba", "Kukorica", "Paprika"]);
        hawaiiKukoricas.kirajzol();

    </script>
</body>
</html>
