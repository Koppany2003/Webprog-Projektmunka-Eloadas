<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>React CRUD - Helyi tároló</title>
    <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
    .vissza { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
    .vissza:hover { background: #1a252f; }
    
    input { padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
    button { padding: 10px 15px; cursor: pointer; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
    button:hover { background-color: #219150; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
    th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
    th { background-color: #2980b9; color: white; font-weight: normal; text-transform: uppercase; font-size: 14px; }
    tr:hover { background-color: #f1f8ff; }
    
    td button { padding: 6px 12px; font-size: 12px; margin-right: 5px; }
    td button:first-child { background-color: #f39c12; } /* Módosít gomb sárga */
    td button:first-child:hover { background-color: #d68910; }
    td button:last-child { background-color: #e74c3c; } /* Töröl gomb piros */
    td button:last-child:hover { background-color: #c0392b; }
</style>
</head>
<body>
    <a href="index.html" class="vissza">← Vissza a Főoldalra</a>
    
    <div id="root"></div>

    <script type="module" src="./react-mappa/dist/assets/index.js"></script>
</body>
</html>
